[project]
site_name = "EVN Post-Processing"
site_url = "https://evn-postprocess.readthedocs.io/"
site_description = "Semi-automatic post-processing pipeline for EVN (European VLBI Network) observations"
site_author = "Benito Marcote"
copyright = "&copy; 2024-2026 JIVE"
docs_dir = "docs"

[project.theme]
variant = "modern"
language = "en"
features = ["navigation.tabs", "navigation.sections", "navigation.expand", "navigation.top", "search.suggest", "search.highlight", "content.code.copy", "content.tabs.link"]
palette = [{scheme = "default", primary = "indigo", accent = "amber", toggle = {icon = "material/brightness-7", name = "Switch to dark mode"}}, {scheme = "slate", primary = "indigo", accent = "amber", toggle = {icon = "material/brightness-4", name = "Switch to light mode"}}]
icon = {repo = "fontawesome/brands/github"}

[project.repo]
name = "bmarcote/evn_postprocess"
url = "https://github.com/bmarcote/evn_postprocess"

[project.nav]
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Installation" = "getting-started/installation.md"},
    {"Quick Start" = "getting-started/quickstart.md"},
    {"Configuration" = "getting-started/configuration.md"},
  ]},
  {"User Guide" = [
    {"Workflow Overview" = "guide/workflow.md"},
    {"Running the Pipeline" = "guide/running.md"},
    {"Batch Mode" = "guide/batch-mode.md"},
    {"Communications" = "guide/comms.md"},
    {"Dashboard" = "guide/dashboard.md"},
    {"Editing Metadata" = "guide/editing.md"},
    {"External Tools" = "guide/tools.md"},
  ]},
  {"Reference" = [
    {"CLI" = "reference/cli.md"},
    {"Workflow Steps" = "reference/steps.md"},
    {"Policy File" = "reference/policy.md"},
    {"Comms Config" = "reference/comms-config.md"},
    {"Environment Variables" = "reference/env-vars.md"},
  ]},
  {"API" = [
    {"experiment" = "api/experiment.md"},
    {"workflow" = "api/workflow.md"},
    {"comms" = "api/comms.md"},
    {"dialog" = "api/dialog.md"},
    {"plotting" = "api/plotting.md"},
    {"process" = "api/process.md"},
    {"pipeline" = "api/pipeline.md"},
    {"policy" = "api/policy.md"},
    {"tools" = "api/tools.md"},
    {"io" = "api/io.md"},
    {"utils" = "api/utils.md"},
    {"mstools" = "api/mstools.md"},
  ]},
  {"Development" = [
    {"Contributing" = "development/contributing.md"},
    {"Architecture" = "development/architecture.md"},
    {"Changelog" = "development/changelog.md"},
  ]},
]

[project.plugins.search]

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv", "https://docs.astropy.org/en/stable/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
show_root_heading = true
show_symbol_type_heading = true
members_order = "source"

# Note: This zensical.toml is provided for future use when Zensical
# reaches stable. For now, the mkdocs.yml config is used for builds.
# Zensical reads mkdocs.yml natively as a compatibility layer.
